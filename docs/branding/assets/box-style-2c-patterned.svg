<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="720" viewBox="0 0 1040 720">
  <!-- سبک جایگزین 2c — پرنقش (نمونه: شیرمال زعفرانی، نیم کیلو) — بازتولیدشده از چیدمان flexbox سند برند (خط‌پایه‌ها با مرورگر اندازه‌گیری شده) -->
  <defs>
    <pattern id="hatch45" width="36" height="36" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="4" height="36" fill="#C79A2C" fill-opacity="0.16"></rect>
    </pattern>
    <pattern id="hatch135" width="36" height="36" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
      <rect width="4" height="36" fill="#C79A2C" fill-opacity="0.16"></rect>
    </pattern>
    <clipPath id="lid"><rect width="1040" height="720" rx="16"></rect></clipPath>
  </defs>
  <rect width="1040" height="720" rx="16" fill="#F0E6D2"></rect>
  <g clip-path="url(#lid)">
    <rect width="1040" height="720" fill="url(#hatch45)"></rect>
    <rect width="1040" height="720" fill="url(#hatch135)"></rect>
  </g>
