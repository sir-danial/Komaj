name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DEBUG: "True"
      DJANGO_SECRET_KEY: ci-secret-key-not-used-in-prod
      ALLOWED_HOSTS: "*"
      SQLITE_PATH: /tmp/db.sqlite3
      USE_S3_STORAGE: "False"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check . --output-format=github
        continue-on-error: true  # warnings while codebase is tiny

      - name: Django system check
        run: python manage.py check

      - name: Migrations check
        run: python manage.py makemigrations --check --dry-run

      - name: Run migrations
        run: |
          mkdir -p /tmp
          python manage.py migrate --noinput
          python manage.py createcachetable

      - name: Collect static
        run: python manage.py collectstatic --noinput

      - name: Run tests
        run: pytest -x --tb=short 2>&1 | tee pytest.log || [ ! -d "apps" ] || grep -q "no tests ran" pytest.log

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: komaj:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
